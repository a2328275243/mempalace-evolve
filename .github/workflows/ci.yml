name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff linter
        run: ruff check src/
      - name: Run ruff formatter check
        run: ruff format --check src/

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,mcp]"

      - name: Run tests with coverage
        if: runner.os != 'Windows'
        run: python -m pytest tests/ -v --tb=short --cov=mempalace_evolve --cov-report=xml --cov-report=term-missing

      - name: Run tests with coverage (Windows, no benchmarks)
        if: runner.os == 'Windows'
        run: python -m pytest tests/ -v --tb=short --ignore=tests/benchmarks --cov=mempalace_evolve --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Verify import
        run: python -c "import mempalace_evolve; print(f'mempalace_evolve {mempalace_evolve.__version__}')"
      - name: Verify SDK import
        run: python -c "from mempalace_evolve.sdk import MemPalace; print('SDK import OK')"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Check package
        run: |
          pip install twine
          twine check dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
