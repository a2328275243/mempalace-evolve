[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = src
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    chromadb: requires chromadb installed
    sdk: tests for the SDK layer
    core: tests for core modules (chroma_helper, config, etc.)
    integration: integration tests that require full pipeline
